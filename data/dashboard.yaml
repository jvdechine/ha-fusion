              state: |-
                {% if int(states(entity_id)) > 0 %}
                  Clique para desligar
                {% else %}
                  Nenhuma luz ligada
                {% endif %}
              color: |-
                {% if int(states(entity_id)) > 0 %}
                  #CC7722
                {% endif %}
