          - name: TV
            items:
              - id: 8838149524393
                type: remote_control
                name: TV Sala
                entity_id: media_player.sala_de_estar_tv_sala
                remote_buttons:
                  - id: 1
                    large: true
                    label: Power
                    icon: mdi:power
                    color: '#c0392b'
                    service: media_player.toggle
                  - id: 2
                    label: Guide
                    icon: mdi:television-guide
                    service: media_player.play_media
                    service_data: >-
                      {"media_content_type":"send_key","media_content_id":"KEY_GUIDE"}
                  - id: 3
                    label: HDMI
                    icon: mdi:hdmi-port
                    service: media_player.play_media
                    service_data: >-
                      {"media_content_type":"send_key","media_content_id":"KEY_HDMI"}
                  - id: 4
                    label: Info
                    icon: mdi:information-outline
                    service: media_player.play_media
                    service_data: >-
                      {"media_content_type":"send_key","media_content_id":"KEY_INFO"}
                  - id: 5
                    spacer: true
                  - id: 6
                    circle: true
                    icon: mdi:chevron-up
                    service: media_player.play_media
                    service_data: >-
                      {"media_content_type":"send_key","media_content_id":"KEY_UP"}
                  - id: 7
                    spacer: true
                  - id: 8
                    circle: true
                    icon: mdi:chevron-left
                    service: media_player.play_media
                    service_data: >-
                      {"media_content_type":"send_key","media_content_id":"KEY_LEFT"}
                  - id: 9
                    circle: true
                    label: OK
                    color: rgba(255,255,255,0.14)
                    service: media_player.play_media
                    service_data: >-
                      {"media_content_type":"send_key","media_content_id":"KEY_ENTER"}
                  - id: 10
                    circle: true
                    icon: mdi:chevron-right
                    service: media_player.play_media
                    service_data: >-
                      {"media_content_type":"send_key","media_content_id":"KEY_RIGHT"}
                  - id: 11
                    spacer: true
                  - id: 12
                    circle: true
                    icon: mdi:chevron-down
                    service: media_player.play_media
                    service_data: >-
                      {"media_content_type":"send_key","media_content_id":"KEY_DOWN"}
                  - id: 13
                    spacer: true
                  - id: 14
                    label: Vol+
                    icon: mdi:volume-plus
                    service: media_player.volume_up
                  - id: 15
                    label: Back
                    icon: mdi:arrow-u-left-top
                    service: media_player.play_media
                    service_data: >-
                      {"media_content_type":"send_key","media_content_id":"KEY_RETURN"}
                  - id: 16
                    label: Ch+
                    icon: mdi:plus
                    service: media_player.play_media
                    service_data: >-
                      {"media_content_type":"send_key","media_content_id":"KEY_CHUP"}
                  - id: 17
                    label: Vol-
                    icon: mdi:volume-minus
                    service: media_player.volume_down
                  - id: 18
                    label: Home
                    icon: mdi:home
                    service: media_player.play_media
                    service_data: >-
                      {"media_content_type":"send_key","media_content_id":"KEY_HOME"}
                  - id: 19
                    label: Ch-
                    icon: mdi:minus
                    service: media_player.play_media
                    service_data: >-
                      {"media_content_type":"send_key","media_content_id":"KEY_CHDOWN"}
                  - id: 20
                    icon: mdi:skip-previous
                    service: media_player.media_previous_track
                  - id: 21
                    icon: mdi:play-pause
                    service: media_player.media_play_pause
                  - id: 22
                    icon: mdi:skip-next
                    service: media_player.media_next_track
                  - id: 23
                    label: Youtube
                    icon: mdi:youtube
                    color: '#FF0000'
                    service: media_player.play_media
                    service_data: >-
                      {"media_content_type":"app","media_content_id":"111299001912"}
                color: >-
                  {% if is_state(entity_id, "on") %}   #CC7722 {% else %}  
                  #2C3031 {% endif %}
              - id: 5942997885166
                type: button
                entity_id: script.ligar_tv_sala_youtube
                name: YouTube
                icon: mdi:youtube
                more_info: false
                template:
                  color: |-
                    {% if is_state(entity_id, "on") %}
                      red
                    {% endif %}
                  service: |-
                    service: script.ligar_tv_sala_youtube
                    data: {}
            id: 3402241572477
          - name: Limpar
            items:
              - id: 9021562437534
                type: button
                entity_id: vacuum.xiaomi_robot_vacuum_s10
                more_info: false
                template:
                  service: |-
                    service: script.limpar_sala
                    data: {
                      segment: 1
                    }
                  state: |-
                    {% if is_state_attr(entity_id, "charging", true) %}
                    Na base
                    {% elif is_state_attr(entity_id, "started", true) %}
                    Limpando
                    {% elif is_state_attr(entity_id, "paused", true) %}
                    Pausado
                    {% elif is_state_attr(entity_id, "running", true) %}
                    Limpando
                    {% elif is_state_attr(entity_id, "returning", true) %}
                    Voltando para base
                    {% endif %}
                  color: >-
                    {% if is_state(entity_id, "on") or is_state(entity_id,
                    "cleaning") %}
                      #CC7722
                    {% endif %}
                name: Limpar
                icon: solar:smart-vacuum-cleaner-bold
            id: 9103161542900
        id: 2308094880711
